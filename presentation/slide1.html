<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Prédiction des Prix Immobiliers</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;family=Lora:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body { margin: 0; padding: 0; background-color: #f0f0f0; font-family: 'Montserrat', sans-serif; overflow: hidden; }
    .slide-container { width: 100vw; height: 100vh; background-color: #ffffff; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .bg-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #1A3A6B; z-index: 0; }
    .geometric-shape { position: absolute; opacity: 0.1; background: white; }
    .shape-1 { top: -100px; right: -100px; width: 600px; height: 600px; border-radius: 50%; }
    .shape-2 { bottom: -50px; left: -50px; width: 400px; height: 400px; border-radius: 50%; opacity: 0.05; }
    .shape-3 { top: 20%; left: 10%; width: 20px; height: 20px; border-radius: 50%; opacity: 0.2; }
    .shape-4 { bottom: 30%; right: 20%; width: 15px; height: 15px; border-radius: 50%; opacity: 0.2; }
    .content-wrapper { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 40px; }
    .university-badge { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 15px 30px; border-radius: 50px; margin-bottom: 40px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; align-items: center; gap: 15px; }
    .main-title { font-size: 58px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); max-width: 900px; }
    .subtitle { font-family: 'Lora', serif; font-size: 28px; font-weight: 400; color: #dbeafe; margin-bottom: 60px; border-bottom: 2px solid #60A5FA; padding-bottom: 15px; }
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 60px; background: rgba(255, 255, 255, 0.05); padding: 30px 50px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
    .info-item { display: flex; align-items: center; gap: 15px; text-align: left; }
    .info-icon { width: 40px; height: 40px; background: #ffffff; color: #1A3A6B; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0; }
    .info-text p { margin: 0; }
    .info-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #93C5FD; margin-bottom: 2px; }
    .info-value { font-size: 18px; font-weight: 600; }
    .nav-buttons { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 1000; }
    .nav-btn { width: 50px; height: 50px; background-color: rgba(26, 58, 107, 0.9); color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); }
    .nav-btn:hover { background-color: rgba(26, 58, 107, 1); transform: scale(1.1); }
    .slide-indicator { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.5); color: white; padding: 8px 20px; border-radius: 20px; font-size: 14px; z-index: 1000; }
</style>
</head>
<body>
<div class="slide-container">
<div class="bg-pattern">
    <div class="geometric-shape shape-1"></div>
    <div class="geometric-shape shape-2"></div>
    <div class="geometric-shape shape-3"></div>
    <div class="geometric-shape shape-4"></div>
    <svg height="100%" style="position: absolute; top:0; left:0; opacity: 0.15; pointer-events: none;" width="100%" viewBox="0 0 1280 720" preserveAspectRatio="none">
        <defs><pattern height="40" id="grid" patternUnits="userSpaceOnUse" width="40"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"></path></pattern></defs>
        <rect fill="url(#grid)" height="100%" width="100%"></rect>
        <path d="M 0 600 Q 300 500 640 600 T 1280 500" fill="none" opacity="0.5" stroke="white" stroke-dasharray="5,5" stroke-width="2"></path>
        <path d="M 0 650 Q 400 550 800 650 T 1280 600" fill="none" opacity="0.5" stroke="#60A5FA" stroke-width="2"></path>
    </svg>
</div>
<div class="content-wrapper">
    <div class="university-badge">
        <i class="fas fa-university fa-lg"></i>
        <p class="text-sm font-bold tracking-wider m-0">Institut Supérieur du Numérique (SupNum)</p>
    </div>
    <h1 class="main-title">Prédiction des Prix Immobiliers en Mauritanie</h1>
    <h2 class="subtitle">Projet Machine Learning — Régression</h2>
    <div class="info-grid">
        <div class="info-item">
            <div class="info-icon"><i class="fas fa-user-graduate"></i></div>
            <div class="info-text">
                <p class="info-label">Présenté par</p>
                <p class="info-value">Bechir Mady</p>
            </div>
        </div>
        <div class="info-item">
            <div class="info-icon"><i class="fas fa-book-reader"></i></div>
            <div class="info-text">
                <p class="info-label">Formation</p>
                <p class="info-value">Master Data Engineering & ML</p>
            </div>
        </div>
        <div class="info-item">
            <div class="info-icon"><i class="fas fa-chalkboard-teacher"></i></div>
            <div class="info-text">
                <p class="info-label">Encadré par</p>
                <p class="info-value">M. Mohamed</p>
            </div>
        </div>
        <div class="info-item">
            <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
            <div class="info-text">
                <p class="info-label">Année Académique</p>
                <p class="info-value">2025 — 2026</p>
            </div>
        </div>
    </div>
</div>
<div class="nav-buttons">
    <button class="nav-btn" onclick="window.location.href='slide2.html'" title="Suivant"><i class="fas fa-arrow-right"></i></button>
</div>
<div class="slide-indicator">1 / 9</div>
</div>
<script>
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') window.location.href = 'slide2.html';
});
</script>
</body>
</html>
